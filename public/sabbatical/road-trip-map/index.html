<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KC → Detroit Disc Golf Leg — Sabbatical 2026</title>

  <link rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    :root {
      --route: #ff5e3a;        /* warm road-trip orange */
      --route-glow: #ffb199;
      --stop: #28e0c8;         /* disc golf course (teal) */
      --start: #6ee7a8;        /* trip origin (green) */
      --camp: #ffc24b;         /* camp / basecamp (amber) */
      --ink: #0b0e16;
    }
    html, body { margin: 0; height: 100%; background: #232734; }
    #map { height: 100%; width: 100%; background: #232734; }

    /* Medium-dark basemap: legible, not black. Gentle lift on Carto dark tiles. */
    .leaflet-tile { filter: brightness(1.22) saturate(1.05); }

    .overlay {
      position: absolute; z-index: 1000; top: 18px; left: 18px;
      color: #f3f5fb; font: 14px/1.4 -apple-system, system-ui, sans-serif;
      background: rgba(11, 14, 22, 0.72); backdrop-filter: blur(6px);
      padding: 14px 18px; border-radius: 12px; max-width: 280px;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .overlay h1 { margin: 0 0 4px; font-size: 16px; letter-spacing: 0.2px; }
    .overlay .sub { color: #9aa3b8; font-size: 12px; margin-bottom: 10px; }
    .overlay .stat { font-variant-numeric: tabular-nums; }
    .overlay .stat b { color: var(--route); }

    .stop-label {
      background: rgba(11, 14, 22, 0.85); color: #f3f5fb;
      border: 1px solid rgba(255,255,255,0.12); border-radius: 6px;
      padding: 2px 7px; font: 12px/1 system-ui, sans-serif; white-space: nowrap;
    }
    .stop-label.camp-label {
      border-color: rgba(255, 194, 75, 0.55); color: #ffe2a0;
    }
    .camp-icon { font-size: 19px; line-height: 24px; text-align: center;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.8); }

    /* Basecamp callout + legend in the overlay */
    .camp-note {
      margin-top: 10px; padding: 8px 10px; border-radius: 8px;
      background: rgba(255, 194, 75, 0.12);
      border: 1px solid rgba(255, 194, 75, 0.30);
      color: #ffe2a0; font-size: 12px; line-height: 1.45;
    }
    .camp-note b { color: var(--camp); }
    .legend { margin-top: 10px; border-top: 1px solid rgba(255,255,255,0.1);
      padding-top: 8px; }
    .legend > div { display: flex; align-items: center; gap: 7px;
      margin: 3px 0; color: #c8cedd; font-size: 12px; }
    .legend .dot { width: 11px; height: 11px; border-radius: 50%;
      border: 1.5px solid #fff; flex: 0 0 auto; }
    .legend .tent { width: 11px; text-align: center; flex: 0 0 auto; }
    .leaflet-popup-content-wrapper {
      background: #11151f; color: #f3f5fb; border-radius: 10px;
    }
    .leaflet-popup-tip { background: #11151f; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div class="overlay">
    <h1>KC → Detroit Disc Golf Leg</h1>
    <div class="sub">Sabbatical 2026 · Aug 17–31 · drive east, then basecamp at Worlds</div>
    <div class="stat" id="stats">Loading route…</div>
    <div class="camp-note">
      🏕️ <b>Proud Lake</b> basecamp · Site 68<br>
      Aug 24–31 · 7 nights · spectate Worlds
    </div>
    <div class="legend">
      <div><span class="dot" style="background:var(--start)"></span>Start (Kansas City)</div>
      <div><span class="dot" style="background:var(--stop)"></span>Disc golf course</div>
      <div><span class="tent">🏕️</span>Camp / basecamp</div>
    </div>
  </div>

  <script>
    const map = L.map("map", { zoomControl: true, attributionControl: true });

    // Carto dark tiles -- no API key required
    L.tileLayer(
      "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
      {
        attribution:
          '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; ' +
          '<a href="https://carto.com/attributions">CARTO</a>',
        maxZoom: 19,
      }
    ).addTo(map);

    fetch("route.geojson")
      .then((r) => r.json())
      .then((geo) => {
        const routeFeature = geo.features.find(
          (f) => f.properties.kind === "route"
        );
        const stops = geo.features.filter(
          (f) => f.properties.kind === "stop"
        );

        // GeoJSON is [lon, lat]; Leaflet wants [lat, lon]
        const latlngs = routeFeature.geometry.coordinates.map(
          ([lon, lat]) => [lat, lon]
        );

        // Glow underlay + crisp route line on top
        L.polyline(latlngs, {
          color: getCss("--route-glow"), weight: 9, opacity: 0.25,
          lineJoin: "round",
        }).addTo(map);
        const line = L.polyline(latlngs, {
          color: getCss("--route"), weight: 3.5, opacity: 0.95,
          lineJoin: "round",
        }).addTo(map);

        // Stop markers — camps render as tents, courses/start as dots
        stops.forEach((s) => {
          const [lon, lat] = s.geometry.coordinates;
          const p = s.properties;
          const name = p.name || "";
          const isStart = p.type === "start";
          const isCamp = p.type === "overnight" || /camp/i.test(name);

          let marker;
          if (isCamp) {
            marker = L.marker([lat, lon], {
              icon: L.divIcon({
                className: "camp-icon", html: "🏕️",
                iconSize: [24, 24], iconAnchor: [12, 22],
              }),
            });
          } else {
            marker = L.circleMarker([lat, lon], {
              radius: isStart ? 7 : 5,
              color: "#fff", weight: 2,
              fillColor: isStart ? getCss("--start") : getCss("--stop"),
              fillOpacity: 1,
            });
          }

          marker
            .addTo(map)
            .bindPopup(
              `<b>${p.name}</b><br><span style="color:#9aa3b8">${p.type}` +
              (p.day ? ` · ${p.day}` : "") + `</span>` +
              (p.notes ? `<br>${p.notes}` : "")
            )
            .bindTooltip(p.name, {
              permanent: true, direction: "right",
              className: isCamp ? "stop-label camp-label" : "stop-label",
              offset: [8, 0],
            });
        });

        map.fitBounds(line.getBounds(), { padding: [60, 60] });

        const camps = stops.filter(
          (s) => s.properties.type === "overnight" ||
                 /camp/i.test(s.properties.name || "")
        );
        const courses = stops.filter((s) => s.properties.type === "course");
        const pr = routeFeature.properties;
        document.getElementById("stats").innerHTML =
          `<b>${pr.distance_mi}</b> mi · <b>${pr.duration_hr}</b> hr drive` +
          `<br>${courses.length} courses · ${camps.length} camp` +
          `${camps.length !== 1 ? "s" : ""}`;
      })
      .catch((e) => {
        document.getElementById("stats").textContent =
          "Could not load route.geojson — run build_route.py first.";
        console.error(e);
      });

    function getCss(name) {
      return getComputedStyle(document.documentElement)
        .getPropertyValue(name).trim();
    }
  </script>
</body>
</html>
